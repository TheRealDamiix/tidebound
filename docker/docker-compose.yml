version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: tidebound-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  # Uncomment if you want a local Postgres instead of Supabase cloud during dev
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: tidebound-postgres
  #   environment:
  #     POSTGRES_USER: tidebound
  #     POSTGRES_PASSWORD: tidebound
  #     POSTGRES_DB: tidebound
  #   ports:
  #     - '5432:5432'
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  # postgres_data:
